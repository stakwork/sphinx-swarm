<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payments Tab Test</title>
  <link rel="stylesheet" href="assets/index-c2235eb1.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&family=Roboto:wght@400&display=swap" rel="stylesheet">
  <style>
    body { 
      background: #1a1a2e; 
      color: white; 
      font-family: 'Barlow', sans-serif; 
      margin: 0; 
      padding: 20px; 
    }
    .mock-payments-container {
      background: #1d2535;
      border-radius: 8px;
      padding: 0;
      max-width: 800px;
      overflow: hidden;
    }
    .endpoint-permission-container {
      padding-top: 1.5rem;
      padding-left: 2.25rem;
      padding-right: 2.25rem;
      padding-bottom: 1rem;
    }
    .endpoint-header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 0.5rem;
    }
    .endpoint_header {
      font-family: 'Barlow', sans-serif;
      font-size: 1.125rem;
      font-weight: 700;
      line-height: 1rem;
      letter-spacing: 0.01em;
      color: white;
      margin: 0;
    }
    .endpoint-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.25);
      gap: 1rem;
    }
    .endpoint-description {
      font-family: 'Barlow', sans-serif;
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.125rem;
      letter-spacing: 0.01em;
      color: #6b7a8d;
      flex: 1;
      min-width: 0;
    }
    .endpoint-description.active { color: #ffffff; }
    .controls-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .price-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    /* Carbon number input styling */
    .bx--number input[type=number] {
      background: #262d3d;
      border: 1px solid #525252;
      color: white;
      font-size: 0.875rem;
      height: 2rem;
      padding: 0 0.5rem;
      width: 80px;
      border-radius: 0;
      outline: none;
    }
    .bx--number input[type=number]::-webkit-inner-spin-button,
    .bx--number input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    /* Carbon button styling */
    .bx--btn--primary {
      background: #0f62fe;
      color: white;
      border: none;
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 400;
      cursor: pointer;
      height: 2rem;
      white-space: nowrap;
    }
    .bx--btn--primary:disabled {
      background: #525252;
      color: #a8a8a8;
      cursor: not-allowed;
    }
    /* Toggle styling */
    .bx--toggle-input__label { display: flex; align-items: center; }
    .bx--toggle__switch {
      position: relative;
      display: inline-block;
      width: 2.5rem;
      height: 1.5rem;
    }
    .toggle-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    label.toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    label.toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #525252;
      transition: .3s;
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #0f62fe; }
    input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body>
  <h3 style="color:#888;font-family:Barlow,sans-serif;margin-bottom:16px;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.1em;">Sphinx Swarm – NavFiber Settings</h3>
  
  <div class="mock-payments-container">
    <!-- Tab bar -->
    <div style="display:flex;border-bottom:1px solid rgba(255,255,255,0.1);padding:0 2.25rem;gap:1rem;">
      <button style="padding:0.75rem 0;background:none;border:none;color:#909BAA;font-family:Barlow,sans-serif;font-size:0.875rem;cursor:pointer;">General</button>
      <button style="padding:0.75rem 0;background:none;border:none;color:#909BAA;font-family:Barlow,sans-serif;font-size:0.875rem;cursor:pointer;">Roles</button>
      <button style="padding:0.75rem 0;background:none;border:none;color:white;font-family:Barlow,sans-serif;font-size:0.875rem;cursor:pointer;border-bottom:0.125rem solid #618AFF;">Payments</button>
      <button style="padding:0.75rem 0;background:none;border:none;color:#909BAA;font-family:Barlow,sans-serif;font-size:0.875rem;cursor:pointer;">Api Keys</button>
    </div>

    <!-- Payments content (EnpointPermission component) -->
    <div class="endpoint-permission-container">
      <div class="endpoint-header-container">
        <h2 class="endpoint_header">Payments</h2>
      </div>

      <!-- Endpoint row 1: toggled on, price unchanged (Save disabled) -->
      <div class="endpoint-container">
        <p class="endpoint-description active">/ask</p>
        <div class="controls-container">
          <div class="price-container">
            <div class="bx--number">
              <input type="number" value="10" min="0" />
            </div>
            <button class="bx--btn--primary" disabled>Save</button>
          </div>
          <div class="toggle-container">
            <label class="toggle">
              <input type="checkbox" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Endpoint row 2: toggled on, price changed (Save enabled) -->
      <div class="endpoint-container">
        <p class="endpoint-description active">/search</p>
        <div class="controls-container">
          <div class="price-container">
            <div class="bx--number">
              <input type="number" value="25" min="0" />
            </div>
            <button class="bx--btn--primary">Save</button>
          </div>
          <div class="toggle-container">
            <label class="toggle">
              <input type="checkbox" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Endpoint row 3: toggled off, price unchanged -->
      <div class="endpoint-container">
        <p class="endpoint-description">/graph</p>
        <div class="controls-container">
          <div class="price-container">
            <div class="bx--number">
              <input type="number" value="0" min="0" />
            </div>
            <button class="bx--btn--primary" disabled>Save</button>
          </div>
          <div class="toggle-container">
            <label class="toggle">
              <input type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Endpoint row 4: toggled off -->
      <div class="endpoint-container">
        <p class="endpoint-description">/tribes</p>
        <div class="controls-container">
          <div class="price-container">
            <div class="bx--number">
              <input type="number" value="5" min="0" />
            </div>
            <button class="bx--btn--primary" disabled>Save</button>
          </div>
          <div class="toggle-container">
            <label class="toggle">
              <input type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Endpoint row 5: toggled on -->
      <div class="endpoint-container">
        <p class="endpoint-description active">/query</p>
        <div class="controls-container">
          <div class="price-container">
            <div class="bx--number">
              <input type="number" value="15" min="0" />
            </div>
            <button class="bx--btn--primary" disabled>Save</button>
          </div>
          <div class="toggle-container">
            <label class="toggle">
              <input type="checkbox" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div style="margin-top:16px;color:#555;font-size:0.75rem;font-family:monospace;">
    Source: app/src/components/Endpoint.svelte + EnpointPermission.svelte
  </div>
</body>
</html>
